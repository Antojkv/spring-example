spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  output:
    ansi:
      enabled: always

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN

app:
  welcome-message: "Welcome to Spring blog!"
  admin-email: "admin@example.com"
  page-size: 10