spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        javax:
          persistence:
            validation:
              mode: none

  output:
    ansi:
      enabled: always

app:
  welcome-message: "Welcome to Spring blog!"
  admin-email: "admin@example.com"
  page-size: 10