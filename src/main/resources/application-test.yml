spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        javax:
          persistence:
            validation:
              mode: none

  output:
    ansi:
      enabled: always

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN
    org.springframework.security: WARN
